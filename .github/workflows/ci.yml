name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the mise-pinned tools (just, nextest, cargo-deny, typos, ...).
      - uses: jdx/mise-action@v2

      # rustup on the runner reads rust-toolchain.toml and installs the pinned toolchain.
      - name: Toolchain versions
        run: rustc --version && cargo --version

      - uses: Swatinem/rust-cache@v2

      # Steps invoke the shared `just` recipes so command definitions live only in
      # the justfile; kept as separate steps for per-check pass/fail annotations.
      - name: Format
        run: just fmt-check

      - name: Clippy
        run: just lint

      - name: Test
        run: just test

      - name: Dependency audit
        run: just deny

      - name: Spelling
        run: just spell

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Installs the mise-pinned tools (just, nextest, cargo-deny, typos, ...).
      # cache: false — mise's cache doesn't preserve the rustup components from
      # rust-toolchain.toml (rustfmt/clippy/llvm-tools), so a cache hit drops
      # them and breaks fmt-check/clippy on later runs.
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          cache: false

      # rustup on the runner reads rust-toolchain.toml and installs the pinned toolchain.
      - name: Toolchain versions
        run: rustc --version && cargo --version

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # Steps invoke the shared `just` recipes so command definitions live only in
      # the justfile; kept as separate steps for per-check pass/fail annotations.
      - name: Format
        run: just fmt-check

      - name: Clippy
        run: just lint

      - name: Test
        run: just test

      - name: Dependency audit
        run: just deny

      - name: Spelling
        run: just spell

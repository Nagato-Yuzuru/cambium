# Keeps GitHub Actions and Cargo dependencies current via weekly PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      # One PR for all action bumps instead of one per action.
      actions:
        patterns: ["*"]

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
    groups:
      # Batch non-breaking updates; majors still open individually for review.
      cargo-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
